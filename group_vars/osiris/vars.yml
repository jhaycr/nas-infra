---
# osiris = future NixOS + ZFS box (photos/documents).
# Hardware not online yet - this is scaffolding. Ansible acts as a thin wrapper
# that copies the Nix config to the host and runs `nixos-rebuild switch`.

# --- Connection ---
ansible_user: ansible
ansible_python_interpreter: /run/current-system/sw/bin/python3   # NixOS python path

# --- jhaycr-local.nixos_deploy ---
nixos_config_src: "nix/osiris"          # source dir in this repo
nixos_config_dest: /etc/nixos           # destination on the host
nixos_use_flake: true                   # build via `nixos-rebuild switch --flake`
nixos_flake_host: osiris                # flake output name (.#osiris)

# --- Storage ---
zfs_pool_name: tank                     # placeholder - set to real pool name
