---
# smith = dedicated NixOS VM running the Hermes agent (nousresearch/hermes-agent,
# josh profile). Replaces the archived docker/neo/ai/.archive/hermes-josh/
# Docker container. VM created manually in Proxmox (see nix/smith/README.md);
# Ansible acts as a thin wrapper that copies the Nix config to the host and
# runs `nixos-rebuild switch`.

# --- Connection ---
ansible_user: ansible
ansible_python_interpreter: /run/current-system/sw/bin/python3   # NixOS python path

# --- jhaycr-local.nixos_deploy ---
nixos_config_src: "nix/smith"           # source dir in this repo
nixos_config_dest: /etc/nixos           # destination on the host
nixos_use_flake: true                   # build via `nixos-rebuild switch --flake`
nixos_flake_host: smith                 # flake output name (.#smith)

# Secrets: delivered as plain env files on the host (NOT sops-nix), rendered
# from group_vars/smith/vault.yml's secret_* vars. nix/smith/configuration.nix
# expects both files to already exist at these paths.
nixos_secret_files:
  # Consumed by the hermes-josh container (virtualisation.oci-containers'
  # environmentFiles) - functionally identical to the archived
  # docker/neo/ai/.archive/hermes-josh/.env.j2.
  - dest: /etc/hermes/hermes-josh.env
    owner: root
    group: root
    mode: "0600"
    content: |
      ANTHROPIC_API_KEY={{ secret_hermes_josh_anthropic_api_key | default('') }}
      OPENAI_API_KEY={{ secret_hermes_josh_openai_api_key | default('') }}
      OPENROUTER_API_KEY={{ secret_hermes_josh_openrouter_api_key | default('') }}
      API_SERVER_KEY={{ secret_hermes_josh_api_server_key | default('') }}
      API_SERVER_ENABLED=true
      # LAN-exposed (host networking + NixOS firewall opens 8642/9119).
      # API is protected by API_SERVER_KEY bearer auth; dashboard by basic auth.
      API_SERVER_HOST=0.0.0.0
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME=josh
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD_HASH={{ secret_hermes_josh_dashboard_password_hash | default('') }}

  # Auto-sourced in interactive shells (environment.interactiveShellInit) for
  # e.g. opencode - same keys, no API_SERVER_KEY, restricted to the ansible user.
  - dest: /etc/hermes/llm.env
    owner: ansible
    group: users
    mode: "0400"
    content: |
      OPENROUTER_API_KEY={{ secret_hermes_josh_openrouter_api_key | default('') }}
      ANTHROPIC_API_KEY={{ secret_hermes_josh_anthropic_api_key | default('') }}
      OPENAI_API_KEY={{ secret_hermes_josh_openai_api_key | default('') }}

  # SSH deploy key (read-write) for the private jhaycr/home-assistant-config
  # repo. Git-first HA workflow: Hermes authors changes in the clone at
  # /var/lib/hermes-workspace/home-assistant-config and pushes hermes/* branches
  # for review; it has NO write access to the live HA box (oracle). Mounted
  # read-only into the container at the same path (see nix/smith/configuration.nix).
  - dest: /etc/hermes/ha-config-deploy.key
    owner: root
    group: root
    mode: "0600"
    content: "{{ secret_hermes_josh_ha_deploy_key | default('') }}"
