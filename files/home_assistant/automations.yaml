- id: '1781936829000'
  alias: Upstairs T10 - Auto Heat/Cool by Room Temp
  description: '>=75F sets Cool; <70F sets Heat (Honeywell Upstairs T10 Plus)'
  triggers:
  - trigger: numeric_state
    entity_id: climate.upstairs_t10_plus_thermostat
    attribute: current_temperature
    above: 74.9
    for:
      minutes: 5
    id: too_hot
  - trigger: numeric_state
    entity_id: climate.upstairs_t10_plus_thermostat
    attribute: current_temperature
    below: 70
    for:
      minutes: 5
    id: too_cold
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: too_hot
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.upstairs_t10_plus_thermostat
        data:
          hvac_mode: cool
    - conditions:
      - condition: trigger
        id: too_cold
      sequence:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.upstairs_t10_plus_thermostat
        data:
          hvac_mode: heat
  mode: single
