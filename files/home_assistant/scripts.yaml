den_party:
  alias: Den Party
  icon: mdi:party-popper
  sequence:
    - action: media_player.turn_on
      target:
        entity_id: media_player.denon_avr_s670h   # Denon AVR (Den)
    # TODO: confirm the AVR's Spotify source name (Settings > Devices > Denon >
    # source list). Common values: "Spotify", "Online Music".
    - action: media_player.select_source
      target:
        entity_id: media_player.denon_avr_s670h
      data:
        source: Spotify
  mode: single
