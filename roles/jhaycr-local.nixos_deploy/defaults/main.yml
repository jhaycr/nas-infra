---
# Source dir (relative to the playbook/repo root) holding the NixOS config.
nixos_config_src: "nix/osiris"
# Destination on the target host.
nixos_config_dest: /etc/nixos
# Build via flake (`nixos-rebuild switch --flake <dest>#<host>`) vs. legacy.
nixos_use_flake: true
nixos_flake_host: "{{ inventory_hostname }}"

# Optional out-of-band secret files written to the host before the rebuild -
# e.g. rendered from ansible-vault, for Nix configs that expect a secret file
# to already exist on disk rather than managing secrets themselves. Empty by
# default; nothing host-specific lives in this role. Each item:
#   dest:    absolute path on the target host (required)
#   content: file content (required)
#   owner / group / mode: default root/root/0600
nixos_secret_files: []

# Systemd units to restart after the rebuild when any secret file's CONTENT
# changed. Units that read secret files only at start (e.g. podman
# environmentFiles) aren't restarted by nixos-rebuild on a content-only
# change - the unit definition itself is unchanged. Empty by default.
nixos_secret_restart_units: []
