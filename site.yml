---

- hosts: neo
  # gather_facts: no
  roles:
    - role: arillso.system.users
      become: yes
    - role: grog.package
      become: yes
    - role: geerlingguy.pip
      become: yes
    - role: geerlingguy.docker
    - role: jhaycr.luks_disks
      tags: disks
    - role: jhaycr.snapraid
      become: yes
      tags: disks
    - role: jhaycr-local.snapraid
      become: yes
      tags: [disks, snapraid]
    - role: tigattack.mergerfs
      tags: disks
    - role: jhaycr-local.safe_shutdown
      tags: disks
    - role: geerlingguy.nfs
    - role: jhaycr-local.backup
      become: yes
    - role: jhaycr-local.logrotate
      become: yes
    - role: jhaycr-local.symlinks
      become: true
      tags: symlinks
    - role: jhaycr-local.proxmox_images
      become: yes
      tags: pve
    #- role: jhaycr-local.proxmox_vm
    #  become: yes
    #  tags: pve
    - role: jhaycr-local.infra_bootstrap
      tags: bootstrap
      become: yes
    - role: jhaycr-local.docker_compose
      tags: compose
      become: yes
    - role: jhaycr-local.gitea_mirrors
      tags: gitea
    - role: jhaycr-local.semaphore
      tags: semaphore
    - role: jhaycr-local.plex
      become: yes
    - role: IronicBadger.proxmox_nag_removal
      become: yes
    - role: jhaycr-local.hetrixtools_agent
      become: yes

  tasks:
    - name: Ensure that downloads directory exists
      become: yes
      ansible.builtin.file:
        path: "{{ nas_download_path }}"
        owner: "{{ main_username }}"
        group: "{{ main_username }}"
        state: directory

    - name: Ensure that downloads directory exists
      become: yes
      ansible.builtin.file:
        path: "{{ nas_download_path }}/usenet/completed"
        owner: "{{ main_username }}"
        group: "{{ main_username }}"
        state: directory

    - name: Ensure that downloads directory exists
      become: yes
      ansible.builtin.file:
        path: "{{ nas_download_path }}/usenet/incomplete-downloads"
        owner: "{{ main_username }}"
        group: "{{ main_username }}"
        state: directory

    - name: Ensure that scripts directory exists
      become: yes
      ansible.builtin.file:
        path: "/home/{{ main_username }}/scripts"
        owner: "{{ main_username }}"
        group: "{{ main_username }}"
        state: directory

    - become: yes
      ansible.builtin.template:
        src: "./templates/tubearchivist/reset_downloads.sh.j2"
        dest: "/home/{{ main_username }}/scripts/tubeachivist_reset_downloads.sh"
        owner: "{{ main_username }}"
        group: "{{ main_username }}"
        mode: 0775

    - become: yes
      ansible.builtin.template:
        src: "./templates/gluetun/rotate_ip.sh.j2"
        dest: "/home/{{ main_username }}/scripts/gluetun_rotate_ip.sh"
        owner: "{{ main_username }}"
        group: "{{ main_username }}"
        mode: 0775

    - name: Schedule gluetun rotation
      become: yes
      cron:
        name: gluetun IP rotation
        job: "/home/{{ main_username }}/scripts/gluetun_rotate_ip.sh"
        user: "root"
        weekday: "*"
        month: "*"
        day: "*"
        hour: "8"
        minute: "0"
        state: present
      
- hosts: morpheus
  roles:
    - role: IronicBadger.proxmox_nag_removal
    - role: geerlingguy.docker
    - role: jhaycr-local.docker_compose
      tags: compose

- hosts: trinity
  roles:
    - role: grog.package
      become: yes
    - role: jhaycr-local.docker_compose
      tags: compose
      become: yes

  tasks:
    - name: Install Snaps
      become: yes
      community.general.snap:
        name: "{{ item.name }}"
        state: "{{ item.state | default('present') }}"
        channel: "{{ item.channel | default('stable') }}"
        classic: "{{ item.classic | default(false) }}"
        dangerous: "{{ item.dangerous | default(false) }}"
      with_items: "{{ snap_list }}"

    - name: Install flatpaks
      become: yes
      community.general.flatpak:
        name: "{{ item.name }}"
        method: "{{ item.method | default('system') }}"
        no_dependencies: "{{ item.no_dependencies | default('false') }}"
        remote: "{{ item.remote | default('flathub') }}"
        state: "{{ item.state | default('present') }}"
      with_items: "{{ flatpak_list }}"

    - name: Swappiness to 10%
      become: yes
      ansible.posix.sysctl:
        name: vm.swappiness
        value: '10'
        state: present

    - name: Ensure local hosts entry for neo
      become: yes
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^{{ internal_ip_neo }}\s+neo\b'
        line: "{{ internal_ip_neo }} neo.lan"
        state: present

    - name: Check if zellij is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/zellij
      register: zellij_binary

    # Prebuilt musl binary from GitHub releases (no Rust toolchain needed).
    # Only runs when the binary is missing, so re-running the playbook won't
    # re-download it; delete /usr/local/bin/zellij to force an update.
    - name: Download and install zellij (prebuilt musl binary)
      become: yes
      ansible.builtin.unarchive:
        src: "{{ zellij_download_url }}"
        dest: /usr/local/bin
        remote_src: yes
        mode: '0755'
      when: not zellij_binary.stat.exists

# oracle = Home Assistant Green (HAOS). Config managed via bellackn.hass_control
# over the Terminal & SSH addon. Default `make oracle` pulls (get); `make
# oracle-push` pushes (set). See group_vars/oracle/vars.yml.
- hosts: oracle
  gather_facts: no
  pre_tasks:
    # Backup gate: every config push (set mode) takes a partial Supervisor
    # backup first. `raw` because python3 may not exist in the SSH addon yet
    # (the role's prepare.yml installs it later). Skip only in emergencies
    # with -e ha_skip_backup=true.
    - name: Pre-push HA backup (partial)
      raw: ha backups new --folders homeassistant --name "pre-push-{{ lookup('pipe', 'date -u +%Y%m%d-%H%M%S') }}" --no-progress
      register: ha_backup_result
      failed_when: "'slug:' not in ha_backup_result.stdout"
      when:
        - hass_control_mode == "set"
        - not (ha_skip_backup | default(false) | bool)
      tags: [ha, homeassistant]
  roles:
    - role: bellackn.hass_control
      tags: [ha, homeassistant]

# osiris = future NixOS/ZFS box. SCAFFOLD - only runs when targeted with
# --limit osiris (no host in inventory until hardware is online).
- hosts: osiris
  gather_facts: no
  roles:
    - role: jhaycr-local.nixos_deploy
      tags: [nixos]

# smith = dedicated NixOS VM running the Hermes agent. SCAFFOLD - only runs
# when targeted with --limit smith (no host in inventory until the VM is
# manually created, see nix/smith/README.md).
- hosts: smith
  gather_facts: no
  roles:
    - role: jhaycr-local.nixos_deploy
      tags: [nixos]

