---
# sops recipients for nix/smith/secrets.yaml.
#
# SCAFFOLD: secrets.yaml does not exist yet - it cannot be encrypted until the
# smith VM is installed (its age key is derived from a host key that doesn't
# exist yet). See README.md for the full bring-up + first-encrypt workflow.
#
# Fill in both age recipients below, then create+encrypt secrets.yaml with:
#   sops nix/smith/secrets.yaml
keys:
  # Host key: derived from smith's SSH host key (ssh-keyscan -t ed25519
  # 192.168.1.61 | ssh-to-age). Re-derive if the VM is ever reinstalled.
  - &host_smith age12h864pa3zvjfdhm9r623lshx79edkt5mpgk287lfdlupr0c2kgzqdw92z9

  # Admin key: dedicated age keypair (trinity has no ed25519 SSH key, and
  # ssh-to-age can't use RSA). Private half lives at
  # ~/.config/sops/age/keys.txt on trinity - sops finds it there automatically.
  - &admin_josh age17myz4s9wye5glmk3r8wvasvgq477tvvnful6vv72w9xq0aukhs7swveek4

creation_rules:
  # NB: paths are relative to this .sops.yaml's directory (nix/smith/)
  - path_regex: secrets\.yaml$
    key_groups:
      - age:
          - *host_smith
          - *admin_josh
